{% extends 'todos/base.html' %}
{% block title %}Ro'yxatdan o'tish{% endblock %}

{% block content %}
<div class="page-header">
    <h1>📝 Ro'yxatdan o'tish</h1>
</div>

<div class="card" style="max-width: 400px;">
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <p style="color: var(--danger); font-size: 0.8rem; margin-top: 4px;">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
        {% endfor %}
        <div style="display: flex; gap: 8px; margin-top: 1.5rem; align-items: center;">
            <button type="submit" class="btn btn-primary">Ro'yxatdan o'tish</button>
            <a href="{% url 'account_login' %}" style="font-size: 0.85rem; color: var(--muted);">Akkount bor? Kiring</a>
        </div>
    </form>
</div>
{% endblock %}
