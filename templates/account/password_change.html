{% extends 'todos/base.html' %}
{% block title %}Parol o'zgartirish{% endblock %}

{% block content %}
<div class="page-header">
    <h1>🔑 Parol o'zgartirish</h1>
    <a href="{% url 'profile' %}" class="btn btn-outline">← Orqaga</a>
</div>

<div class="card" style="max-width: 440px;">
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <p style="color: var(--danger); font-size: 0.8rem; margin-top: 4px;">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
        {% endfor %}
        <div style="display: flex; gap: 8px; margin-top: 1.5rem;">
            <button type="submit" class="btn btn-primary">Saqlash</button>
            <a href="{% url 'profile' %}" class="btn btn-outline">Bekor qilish</a>
        </div>
    </form>
</div>
{% endblock %}
